name: drawing_x
drones:
  lb2:
    target: [ -0.30, -0.12, 1.12, 0.0 ]
    waypoints: []
    delta_t: 15
    iterations: 1
    params:
      linear: true
      relative: false
    servos: [ [180, 403] ]
    led:
      mode: "expression"
      rate: 50
      formula: >
        ([251, 23, 150] if int(t / 2) % 2 == 0 else [251, 186, 23])
        if i > max(19, 49 - (t % 2) * 30)
        else (
          ([251, 186, 23] if int(t / 2) % 2 == 0 else [251, 23, 150])
          if t > 2 and i > 19
          else 
          [0, 0, 0]
        )
  lb3:
    target: [ 0.0, -0.12, 0.88, 0.0 ]
    waypoints: []
    delta_t: 15
    iterations: 1
    params:
      linear: true
      relative: false
    servos: [ [ 180, 316 ] ]
    led:
      mode: "expression"
      rate: 50
      formula: >
        ([251, 23, 150] if int(t / 2) % 2 == 0 else [251, 186, 23])
        if i > max(19, 49 - (t % 2) * 30)
        else (
          ([251, 186, 23] if int(t / 2) % 2 == 0 else [251, 23, 150])
          if t > 2 and i > 19
          else 
          [0, 0, 0]
        )
  lb4:
    target: [ -0.30, 0.12, 0.88, 0.0 ]
    waypoints: []
    delta_t: 15
    iterations: 1
    params:
      linear: true
      relative: false
    servos: [ [0, 222] ]
    led:
      mode: "expression"
      rate: 50
      formula: >
        ([251, 23, 150] if int(t / 2) % 2 == 0 else [251, 186, 23])
        if i > max(19, 49 - (t % 2) * 30)
        else (
          ([251, 186, 23] if int(t / 2) % 2 == 0 else [251, 23, 150])
          if t > 2 and i > 19
          else 
          [0, 0, 0]
        )
  lb5:
    target: [ 0.0, 0.12, 1.12, 0.0 ]
    waypoints: []
    delta_t: 15
    iterations: 1
    params:
      linear: true
      relative: false
    servos: [ [ 131, 356 ] ]
    led:
      mode: "expression"
      rate: 50
      formula: >
        ([251, 23, 150] if int(t / 2) % 2 == 0 else [251, 186, 23])
        if i < min(31, (t % 2) * 30)
        else (
          ([251, 186, 23] if int(t / 2) % 2 == 0 else [251, 23, 150])
          if t > 2 and i < 31
          else 
          [0, 0, 0]
        )

