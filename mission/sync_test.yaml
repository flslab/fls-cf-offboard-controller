name: sync_test_x
drones:
  lb3:
    target: [ -0.5, -1.0, 1.0, 0.0 ]
    waypoints: [ [ -0.5, -1.0, 1.0, 0.0, 0.0 ], [ 0.5, -1.0, 1.0, 0.0, 1.5 ], [ -0.5, -1.0, 1.0, 0.0, 1.5 ] ]
    delta_t: 1.5
    iterations: 300
    params:
      linear: true
      relative: false
    servos: [ [ 180, 360 ] ]
    color: [ 255, 0, 0 ]
  lb4:
    target: [ -0.5, 0.0, 1.0, 0.0 ]
    waypoints: [ [ -0.5, 0.0, 1.0, 0.0, 0.0 ], [ 0.5, 0.0, 1.0, 0.0, 1.5 ], [ -0.5, 0.0, 1.0, 0.0, 1.5 ] ]
    delta_t: 1.5
    iterations: 300
    params:
      linear: true
      relative: false
    servos: [ [ 0, 180 ] ]
    color: [ 0, 255, 0 ]
  lb5:
    target: [ -0.5, 1.0, 1.0, 0.0 ]
    waypoints: [[-0.5, 1.0, 1.0, 0.0, 0.0], [0.5, 1.0, 1.0, 0.0, 1.5], [-0.5, 1.0, 1.0, 0.0, 1.5]]
    delta_t: 1.5
    iterations: 300
    params:
      linear: true
      relative: false
    servos: [ [0, 180] ]
    color: [0, 0, 255]

